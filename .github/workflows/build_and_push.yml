name: Build and Push Quarkus Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata (Tags/Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build Application Package
        run: ./mvnw clean package

      - name: Push Images via Jib
        run: |
          # Convert the multiline string of tags into an array
          echo "${{ steps.meta.outputs.tags }}" | while read -r image_with_tag; do
            if [ -n "$image_with_tag" ]; then
              # Extract just the tag part from the full image string (everything after the colon)
              TAG=$(echo "$image_with_tag" | awk -F':' '{print $2}')
          
              echo "Pushing tag: $TAG"
              ./mvnw quarkus:container-image-push \
                -Dquarkus.container-image.builder=jib \
                -Dquarkus.container-image.registry=${{ env.REGISTRY }} \
                -Dquarkus.container-image.group=${{ github.repository_owner }} \
                -Dquarkus.container-image.name=${{ github.event.repository.name }} \
                -Dquarkus.container-image.tag=$TAG
            fi
          done
