name: Build and Push Quarkus Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Unf*ck stupid github git checkout
        run: |
          # 1. Clean the workspace directory just in case
          rm -rf ./* .git
          
          # 2. Clone the repo using the GitHub token for authentication
          # We use the full repository URL so it maps all remote tracking branches properly
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          
          # 3. Switch to the exact branch you selected for the manual run
          # This ensures you aren't in a "detached HEAD" state
          git checkout ${{ github.ref_name }}

      - name: Debug Git Tags
        run: |
          git log --oneline -n 5
          git tag -l
          git describe --tags --always

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push with Jib
        run: |
          git describe --tags --always
          RAW_TAGS=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout | awk -F. '{print $1 "," $1"."$2 "," $1"."$2"."$3}')
          echo "Raw tags: $RAW_TAGS"
