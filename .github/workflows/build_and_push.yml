name: Build and Push Quarkus Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Nuclear Git Refspec Fix
        run: |
          # 1. Force Git to track ALL tags and refs explicitly
          git config --global remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
          git config --add remote.origin.fetch "+refs/tags/*:refs/tags/*"
          
          # 2. Fetch everything with tags forced
          git fetch --all --tags --force

      - name: Debug Git Tags
        run: |
          git log --oneline -n 5
          git tag -l
          git describe --tags --always

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push with Jib
        run: |
          git describe --tags --always
          RAW_TAGS=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout | awk -F. '{print $1 "," $1"."$2 "," $1"."$2"."$3}')
          echo "Raw tags: $RAW_TAGS"
